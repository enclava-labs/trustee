name: Build and Push Enclava KBS Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Optional additional image tag to publish, for example v0.1.0-enclava.1"
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build-kbs:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        env:
          VERSION_TAG: ${{ github.event.inputs.version_tag }}
        run: |
          if [ -n "${VERSION_TAG}" ]; then
            echo "tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push KBS image
        run: |
          docker buildx build --provenance false \
            --platform linux/amd64 \
            -f kbs/docker/coco-as-grpc/Dockerfile \
            --build-arg BUILDPLATFORM=linux/amd64 \
            --build-arg ARCH=x86_64 \
            --push \
            --metadata-file /tmp/kbs-image-metadata.json \
            -t ghcr.io/enclava-labs/trustee-kbs-grpc-as:${{ steps.tag.outputs.tag }} \
            -t ghcr.io/enclava-labs/trustee-kbs-grpc-as:latest \
            .

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Sign pushed digest
        run: |
          digest="$(jq -r '."containerimage.digest"' /tmp/kbs-image-metadata.json)"
          if [ -z "${digest}" ] || [ "${digest}" = "null" ]; then
            echo "containerimage.digest missing from build metadata"
            cat /tmp/kbs-image-metadata.json
            exit 1
          fi
          cosign sign --yes "ghcr.io/enclava-labs/trustee-kbs-grpc-as@${digest}"
